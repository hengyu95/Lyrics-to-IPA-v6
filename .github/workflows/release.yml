name: Build and Release

# This makes the action run ONLY when you push a tag like "v1.0.0"
on:
  push:
    tags:
      - 'v*' 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # This matrix tells GitHub to run this exact process twice: 
    # Once on a Windows machine, once on a Mac machine.
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Change this to match your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 eng_to_ipa
        # Add any other pip installs your app needs here

    - name: Build with PyInstaller
      # This uses the .spec file you generated earlier
      run: pyinstaller LyricsToIPA.spec

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        # Grabs everything inside the dist folder to put on the release page
        files: dist/* 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}